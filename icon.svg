<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <!-- Screen Glow Filter -->
    <filter id="neon-glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="8" result="blur" />
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <linearGradient id="body-grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#1e1b4b" />
      <stop offset="100%" stop-color="#0f172a" />
    </linearGradient>
    <linearGradient id="neon-grad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#ec4899" />
      <stop offset="100%" stop-color="#3b82f6" />
    </linearGradient>
    <linearGradient id="screen-grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0284c7" />
      <stop offset="100%" stop-color="#0f172a" />
    </linearGradient>
  </defs>

  <!-- Background rounded corner box -->
  <rect width="512" height="512" rx="112" fill="url(#body-grad)"/>
  
  <!-- Outer glowing neon frame -->
  <rect x="16" y="16" width="480" height="480" rx="96" fill="none" stroke="url(#neon-grad)" stroke-width="4" opacity="0.4" filter="url(#neon-glow)" />

  <!-- The Arcade Machine Cabinet Drawing -->
  <g transform="translate(6, 0)">
    <!-- Cabinet Main Body (Shadow/Base) -->
    <path d="M160,80 L340,80 L370,140 L350,330 L380,360 L360,460 L140,460 L120,360 L150,330 L130,140 Z" fill="#0f0f16" stroke="#2a2e3d" stroke-width="6" />

    <!-- Side Panels (Neon Blue and Pink Accents) -->
    <!-- Left Wing -->
    <path d="M160,80 L130,140 L150,330 L120,360 L140,460 L155,460 L135,365 L165,335 L145,145 L175,85 Z" fill="url(#neon-grad)" />
    <!-- Right Wing -->
    <path d="M340,80 L370,140 L350,330 L380,360 L360,460 L345,460 L365,365 L335,335 L355,145 L325,85 Z" fill="url(#neon-grad)" />

    <!-- Top Marquee (Neon Header) -->
    <polygon points="175,85 325,85 332,130 168,130" fill="#2563eb" stroke="#60a5fa" stroke-width="3" filter="url(#neon-glow)" />
    <text x="250" y="115" font-family="'Segoe UI', Roboto, sans-serif" font-weight="900" font-size="24" fill="#ffffff" text-anchor="middle" letter-spacing="4" filter="url(#neon-glow)">ARCADE</text>
    
    <!-- Screen Bezel -->
    <polygon points="168,135 332,135 342,305 158,305" fill="#181825" stroke="#374151" stroke-width="3" />
    
    <!-- Game Screen (Glowing Cyan-Purple) -->
    <polygon points="182,148 318,148 326,292 174,292" fill="url(#screen-grad)" stroke="#06b6d4" stroke-width="2" filter="url(#neon-glow)" />
    
    <!-- Screen Pixel Graphics -->
    <circle cx="210" cy="200" r="14" fill="#ef4444" opacity="0.8" filter="url(#neon-glow)" />
    <circle cx="290" cy="230" r="22" fill="#22c55e" opacity="0.8" filter="url(#neon-glow)" />
    <circle cx="245" cy="180" r="8" fill="#facc15" opacity="0.8" filter="url(#neon-glow)" />
    <!-- Glowing lines on screen -->
    <path d="M190,260 L310,260" stroke="#ffffff" stroke-width="2" opacity="0.3" stroke-dasharray="4,4" />
    <path d="M210,270 L290,270" stroke="#06b6d4" stroke-width="3" opacity="0.7" filter="url(#neon-glow)" />

    <!-- Control Panel Base -->
    <polygon points="158,310 342,310 350,360 150,360" fill="#1f2937" stroke="#4b5563" stroke-width="2" />
    
    <!-- Joystick -->
    <line x1="200" y1="345" x2="195" y2="325" stroke="#9ca3af" stroke-width="5" stroke-linecap="round" />
    <circle cx="193" cy="320" r="12" fill="#ef4444" filter="url(#neon-glow)" />
    
    <!-- Action Buttons -->
    <circle cx="255" cy="342" r="6" fill="#10b981" filter="url(#neon-glow)" />
    <circle cx="275" cy="336" r="6" fill="#06b6d4" filter="url(#neon-glow)" />
    <circle cx="295" cy="342" r="6" fill="#f59e0b" filter="url(#neon-glow)" />
    
    <circle cx="260" cy="354" r="6" fill="#ec4899" filter="url(#neon-glow)" />
    <circle cx="280" cy="348" r="6" fill="#8b5cf6" filter="url(#neon-glow)" />
    <circle cx="300" cy="354" r="6" fill="#ef4444" filter="url(#neon-glow)" />

    <!-- Lower Cabinet (Coin Door section) -->
    <polygon points="151,365 349,365 342,450 158,450" fill="#111827" />
    
    <!-- Coin Door -->
    <rect x="220" y="380" width="60" height="60" rx="6" fill="#1f2937" stroke="#374151" stroke-width="2" />
    <rect x="230" y="390" width="16" height="24" rx="2" fill="#030712" />
    <rect x="254" y="390" width="16" height="24" rx="2" fill="#030712" />
    <!-- Glowing orange coin slot light -->
    <rect x="237" y="394" width="2" height="10" rx="1" fill="#f97316" filter="url(#neon-glow)" />
    <rect x="261" y="394" width="2" height="10" rx="1" fill="#f97316" filter="url(#neon-glow)" />
  </g>
</svg>
